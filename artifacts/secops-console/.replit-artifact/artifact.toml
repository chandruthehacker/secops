kind = "web"
previewPath = "/"
title = "SecOps Console"
version = "1.0.0"
id = "artifacts/secops-console"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19925

[services.development]
run = "pnpm --filter @workspace/secops-console run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/secops-console", "run", "build" ]
publicDir = "artifacts/secops-console/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19925"
BASE_PATH = "/"
